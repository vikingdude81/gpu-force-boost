<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPU Force Boost</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e14; }
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0e14; }
    ::-webkit-scrollbar-thumb { background: #1a2a3a; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const PSTATE_INFO = {
      P0: { label: "MAX BOOST", color: "#00ff88", glow: "0 0 20px #00ff8855" },
      P1: { label: "High Perf",  color: "#44dd66", glow: "0 0 15px #44dd6644" },
      P2: { label: "Medium",     color: "#aacc33", glow: "0 0 10px #aacc3333" },
      P3: { label: "Med-Low",    color: "#ddaa22", glow: "0 0 10px #ddaa2233" },
      P5: { label: "Low",        color: "#ff8833", glow: "0 0 10px #ff883333" },
      P8: { label: "IDLE",       color: "#ff3344", glow: "0 0 20px #ff334455" },
    };
    const HISTORY_LEN = 60;
    const MONO = "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace";

    // ── ArcGauge ──────────────────────────────────────────────────────────────
    function ArcGauge({ value, max, label, unit, color, size = 120 }) {
      const pct = Math.min((value || 0) / (max || 1), 1);
      const r = size / 2 - 12;
      const cx = size / 2, cy = size / 2;
      const startAngle = -220, endAngle = 40;
      const totalArc = endAngle - startAngle;
      const filledAngle = startAngle + totalArc * pct;

      function polar(angle) {
        const rad = (angle * Math.PI) / 180;
        return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
      }
      const bgStart = polar(startAngle), bgEnd = polar(endAngle), fillEnd = polar(filledAngle);
      const largeArcBg   = totalArc > 180 ? 1 : 0;
      const largeArcFill = filledAngle - startAngle > 180 ? 1 : 0;

      return (
        <div style={{ textAlign: "center" }}>
          <svg width={size} height={size * 0.75} viewBox={`0 0 ${size} ${size * 0.85}`}>
            <path d={`M ${bgStart.x} ${bgStart.y} A ${r} ${r} 0 ${largeArcBg} 1 ${bgEnd.x} ${bgEnd.y}`}
              fill="none" stroke="#1a2a3a" strokeWidth="8" strokeLinecap="round" />
            {pct > 0.005 && (
              <path d={`M ${bgStart.x} ${bgStart.y} A ${r} ${r} 0 ${largeArcFill} 1 ${fillEnd.x} ${fillEnd.y}`}
                fill="none" stroke={color} strokeWidth="8" strokeLinecap="round"
                style={{ filter: `drop-shadow(0 0 6px ${color}66)` }} />
            )}
            <text x={cx} y={cy - 2} textAnchor="middle" fill="#e0e8f0" fontSize="22" fontWeight="700" fontFamily={MONO}>
              {typeof value === "number" ? Math.round(value) : "–"}
            </text>
            <text x={cx} y={cy + 16} textAnchor="middle" fill="#5a7a9a" fontSize="10" fontFamily={MONO}>{unit}</text>
          </svg>
          <div style={{ color: "#6a8aaa", fontSize: 11, marginTop: -8, fontFamily: MONO, letterSpacing: "0.5px" }}>{label}</div>
        </div>
      );
    }

    // ── MiniChart ─────────────────────────────────────────────────────────────
    function MiniChart({ data, color, height = 40, width = 200, max }) {
      if (!data.length) return <div style={{ height, width, background: "#0a0e14", borderRadius: 4 }} />;
      const chartMax = max || Math.max(...data, 1);
      const points = data.map((v, i) => {
        const x = (i / (HISTORY_LEN - 1)) * width;
        const y = height - (v / chartMax) * (height - 4) - 2;
        return `${x},${y}`;
      }).join(" ");
      const areaPoints = `0,${height} ${points} ${width},${height}`;
      const gid = `g${color.replace(/[^a-z0-9]/gi, "")}`;
      return (
        <svg width={width} height={height} style={{ display: "block" }}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.3" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          <polygon points={areaPoints} fill={`url(#${gid})`} />
          <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
        </svg>
      );
    }

    // ── StatusBadge ───────────────────────────────────────────────────────────
    function StatusBadge({ active, label }) {
      return (
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 6,
          padding: "4px 12px", borderRadius: 20,
          background: active ? "#00ff8815" : "#ff334415",
          border: `1px solid ${active ? "#00ff8833" : "#ff334433"}`,
        }}>
          <div style={{
            width: 8, height: 8, borderRadius: "50%",
            background: active ? "#00ff88" : "#ff3344",
            boxShadow: active ? "0 0 8px #00ff8888" : "0 0 8px #ff334488",
            animation: active ? "pulse 2s infinite" : "none",
          }} />
          <span style={{ fontSize: 11, color: active ? "#00ff88" : "#ff3344", fontFamily: MONO, fontWeight: 600 }}>
            {label}
          </span>
        </div>
      );
    }

    // ── Btn ───────────────────────────────────────────────────────────────────
    function Btn({ onClick, disabled, color, children }) {
      return (
        <button onClick={onClick} disabled={disabled} style={{
          padding: "12px 20px",
          border: `1px solid ${color}44`,
          borderRadius: 8,
          background: disabled ? `${color}08` : `${color}18`,
          color: disabled ? `${color}44` : color,
          fontSize: 13, fontWeight: 600,
          cursor: disabled ? "not-allowed" : "pointer",
          fontFamily: MONO, letterSpacing: "1px",
          transition: "all 0.2s",
          width: "100%",
          opacity: disabled ? 0.5 : 1,
        }}>
          {children}
        </button>
      );
    }

    // ── GpuDashboard ──────────────────────────────────────────────────────────
    function GpuDashboard() {
      const [state, setState] = useState({
        pstate: "...", gpuClock: 0, memClock: 0, maxGpuClock: 1200, maxMemClock: 6144,
        gpuUtil: 0, memUtil: 0, tempC: 0, powerDraw: 0, powerLimit: 70,
        memUsedMB: 0, memTotalMB: 6144, persistence: false, name: "Connecting...",
      });
      const [history, setHistory]       = useState({ gpu: [], mem: [], temp: [], power: [] });
      const [transitioning, setTrans]   = useState(false);
      const [connected, setConnected]   = useState(false);
      const [autoMode, setAutoMode]     = useState(false);
      const [lmDetected, setLmDetected] = useState(false);
      const [logs, setLogs] = useState([
        { time: new Date().toTimeString().slice(0,8), msg: "GPU Force Boost dashboard loaded", type: "info" },
        { time: new Date().toTimeString().slice(0,8), msg: "Connecting to API server on :3001...", type: "warn" },
      ]);

      const prevConnected = useRef(false);

      const addLog = useCallback((msg, type = "info") => {
        const time = new Date().toTimeString().slice(0, 8);
        setLogs(prev => [...prev.slice(-50), { time, msg, type }]);
      }, []);

      // ── Status polling ──
      useEffect(() => {
        const poll = () => {
          fetch("/api/status")
            .then(r => r.json())
            .then(data => {
              if (data.error) { addLog("API: " + data.error, "error"); setConnected(false); return; }
              setConnected(true);
              setState(data);
              setHistory(prev => ({
                gpu:   [...prev.gpu.slice(  -(HISTORY_LEN-1)), data.gpuUtil],
                mem:   [...prev.mem.slice(  -(HISTORY_LEN-1)), data.memTotalMB ? Math.round((data.memUsedMB / data.memTotalMB) * 100) : 0],
                temp:  [...prev.temp.slice( -(HISTORY_LEN-1)), data.tempC],
                power: [...prev.power.slice(-(HISTORY_LEN-1)), data.powerDraw],
              }));
            })
            .catch(() => setConnected(false));
        };
        poll();
        const id = setInterval(poll, 2000);
        return () => clearInterval(id);
      }, []);

      // Log connect/disconnect events
      useEffect(() => {
        if (connected && !prevConnected.current) {
          addLog(`Connected — ${state.name}`, "success");
        } else if (!connected && prevConnected.current) {
          addLog("Lost connection to API server", "error");
        }
        prevConnected.current = connected;
      }, [connected]);

      // ── Auto-mode LM Studio polling ──
      useEffect(() => {
        if (!autoMode) return;
        const poll = () => {
          fetch("/api/detect?process=LM+Studio")
            .then(r => r.json())
            .then(data => {
              setLmDetected(prev => {
                if (data.found && !prev) {
                  addLog("LM Studio detected — applying boost profile", "success");
                  fetch("/api/boost", { method: "POST" });
                } else if (!data.found && prev) {
                  addLog("LM Studio exited — resetting GPU", "warn");
                  fetch("/api/reset", { method: "POST" });
                }
                return !!data.found;
              });
            })
            .catch(() => {});
        };
        poll();
        const id = setInterval(poll, 5000);
        return () => clearInterval(id);
      }, [autoMode, addLog]);

      const handleBoost = () => {
        setTrans(true);
        addLog("Sending boost command...", "info");
        fetch("/api/boost", { method: "POST" })
          .then(r => r.json())
          .then(d => { addLog(d.msg || "Boost applied", d.ok ? "success" : "error"); setTrans(false); })
          .catch(e => { addLog("Boost error: " + e.message, "error"); setTrans(false); });
      };

      const handleReset = () => {
        setTrans(true);
        addLog("Sending reset command...", "info");
        fetch("/api/reset", { method: "POST" })
          .then(r => r.json())
          .then(d => { addLog(d.msg || "Reset applied", d.ok ? "warn" : "error"); setTrans(false); })
          .catch(e => { addLog("Reset error: " + e.message, "error"); setTrans(false); });
      };

      const toggleAuto = () => {
        setAutoMode(prev => {
          const next = !prev;
          addLog(next ? "Auto mode ON — watching for LM Studio" : "Auto mode OFF", next ? "success" : "warn");
          if (!next) setLmDetected(false);
          return next;
        });
      };

      const boosted = !!state.boostActive || (
        ["P0", "P1", "P2"].includes(state.pstate) &&
        state.gpuClock >= 900 &&
        state.memClock >= 5000
      );
      const clocksLocked = !!state.clocksLocked;
      const boostReady = !!state.boostReady || clocksLocked || (
        ["P0", "P1", "P2"].includes(state.pstate) && state.memClock >= 5000
      );
      const ps = PSTATE_INFO[state.pstate] || (connected
        ? { label: "UNKNOWN", color: "#8888aa", glow: "none" }
        : { label: "OFFLINE", color: "#4a6a8a", glow: "none" });

      // When clocks are locked but GPU is idle, show a "ready" variant
      const heroColor = boostReady && !boosted ? "#aadd44" : ps.color;
      const heroGlow  = boostReady && !boosted ? "0 0 20px #aadd4444" : ps.glow;
      const heroLabel = boostReady && !boosted ? "READY | WAITING FOR LOAD" : ps.label;

      return (
        <div style={{
          minHeight: "100vh", background: "#0a0e14", color: "#c0d0e0",
          fontFamily: MONO, padding: 24,
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
          `}</style>

          {/* ── Header ── */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#e0e8f0", letterSpacing: "2px", textTransform: "uppercase" }}>
                <span style={{ color: ps.color }}>◆</span> GPU Force Boost
              </h1>
              <div style={{ fontSize: 11, color: "#4a6a8a", marginTop: 4 }}>{state.name} • nvidia-smi controller</div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <StatusBadge active={connected}         label={connected ? "API ONLINE" : "API OFFLINE"} />
              <StatusBadge active={state.driverModel === "TCC"} label={state.driverModel || "---"} />
              <StatusBadge active={clocksLocked}      label={clocksLocked ? "CLOCKS LOCKED" : "CLOCKS FREE"} />
              <StatusBadge active={state.persistence} label={state.persistence ? "PERSIST ON" : "PERSIST OFF"} />
              <StatusBadge active={boosted}           label={boosted ? "BOOST ACTIVE" : "IDLE / LIGHT LOAD"} />
            </div>
          </div>

          {/* ── P-State Hero ── */}
          <div style={{
            background: "#0d1520", border: `1px solid ${heroColor}22`,
            borderRadius: 12, padding: 24, marginBottom: 20,
            textAlign: "center", position: "relative", overflow: "hidden",
          }}>
            <div style={{
              position: "absolute", inset: 0,
              background: `radial-gradient(ellipse at center, ${heroColor}08 0%, transparent 70%)`,
            }} />
            <div style={{ position: "relative" }}>
              <div style={{ fontSize: 56, fontWeight: 700, color: heroColor, textShadow: heroGlow, lineHeight: 1 }}>
                {state.pstate}
              </div>
              <div style={{ fontSize: 13, color: heroColor, opacity: 0.8, marginTop: 4, letterSpacing: "3px" }}>
                {heroLabel}
              </div>
              <div style={{ fontSize: 11, color: "#4a6a8a", marginTop: 8 }}>
                {state.gpuClock} MHz&nbsp;/&nbsp;{state.maxGpuClock} MHz max
              </div>
              {boostReady && !boosted && (
                <div style={{ fontSize: 10, color: "#aadd44", marginTop: 6, opacity: 0.7 }}>
                  Profile is armed. Under load, healthy compute states are usually P0/P1/P2.
                </div>
              )}
            </div>
          </div>

          {/* ── Gauges ── */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginBottom: 20 }}>
            {[
              { v: state.gpuUtil,   max: 100,            label: "GPU LOAD",  unit: "%",  color: "#00ccff" },
              { v: state.memUsedMB, max: state.memTotalMB, label: "VRAM",    unit: "MB", color: "#aa66ff" },
              { v: state.tempC,     max: 95,              label: "TEMP",     unit: "°C", color: state.tempC > 75 ? "#ff4444" : state.tempC > 60 ? "#ffaa22" : "#00ff88" },
              { v: state.powerDraw, max: state.powerLimit || 70, label: "POWER", unit: "W", color: "#ff8844" },
            ].map((g, i) => (
              <div key={i} style={{ background: "#0d1520", borderRadius: 10, padding: 16, border: "1px solid #1a2a3a" }}>
                <ArcGauge value={g.v} max={g.max} label={g.label} unit={g.unit} color={g.color} />
              </div>
            ))}
          </div>

          {/* ── Charts ── */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 16, marginBottom: 20 }}>
            {[
              { data: history.gpu,  color: "#00ccff", label: "GPU Utilization", max: 100, suffix: "%" },
              { data: history.temp, color: "#ff8844", label: "Temperature",     max: 95,  suffix: "°C" },
            ].map((ch, i) => (
              <div key={i} style={{ background: "#0d1520", borderRadius: 10, padding: 16, border: "1px solid #1a2a3a" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 11, color: "#5a7a9a", letterSpacing: "0.5px" }}>{ch.label}</span>
                  <span style={{ fontSize: 11, color: ch.color }}>
                    {ch.data.length ? ch.data[ch.data.length - 1] : 0}{ch.suffix}
                  </span>
                </div>
                <MiniChart data={ch.data} color={ch.color} height={50} width="100%" max={ch.max} />
              </div>
            ))}
          </div>

          {/* ── Controls + Log ── */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>

            {/* Controls */}
            <div style={{ background: "#0d1520", borderRadius: 10, padding: 20, border: "1px solid #1a2a3a" }}>
              <div style={{ fontSize: 12, color: "#5a7a9a", marginBottom: 16, letterSpacing: "1px" }}>CONTROLS</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <Btn onClick={handleBoost} disabled={transitioning || !connected} color="#00ff88">
                  ▲ APPLY BOOST PROFILE
                </Btn>
                <Btn onClick={handleReset} disabled={transitioning || !connected} color="#ff8844">
                  ▼ RESET TO DEFAULT
                </Btn>
                <Btn onClick={toggleAuto} disabled={!connected} color={autoMode ? "#aa66ff" : "#6a8aaa"}>
                  {autoMode ? "◉ AUTO MODE ON" : "○ AUTO MODE OFF"}
                </Btn>
                {autoMode && (
                  <div style={{
                    fontSize: 10, color: lmDetected ? "#00ff88" : "#5a7a9a",
                    padding: "6px 12px", background: "#0a0e14", borderRadius: 6, textAlign: "center",
                  }}>
                    {lmDetected ? "● LM Studio detected — boost profile active" : "○ Watching for LM Studio..."}
                  </div>
                )}
              </div>

              {/* Stats grid */}
              <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 11 }}>
                {[
                  ["GPU CLK",  `${state.gpuClock}/${state.maxGpuClock} MHz`],
                  ["MEM CLK",  `${state.memClock}/${state.maxMemClock} MHz`],
                  ["MEM UTIL", `${state.memUtil}%`],
                  ["VRAM",     `${state.memUsedMB}/${state.memTotalMB} MB`],
                  ["POWER",    `${Math.round(state.powerDraw)}/${state.powerLimit}W`],
                  ["PERSIST",  state.persistence ? "ON" : "OFF"],
                  ["LOCKED",   clocksLocked ? "YES" : "NO"],
                  ["DRIVER",   state.driverModel || "---"],
                  ["P-STATE",  state.pstate],
                ].map(([k, v]) => (
                  <div key={k} style={{ background: "#0a0e14", borderRadius: 6, padding: "6px 10px" }}>
                    <div style={{ color: "#3a5a7a", fontSize: 9, letterSpacing: "0.5px" }}>{k}</div>
                    <div style={{ color: "#8aaacc", marginTop: 2 }}>{v}</div>
                  </div>
                ))}
              </div>

              {/* PS commands */}
              <div style={{ marginTop: 16, fontSize: 10, color: "#3a5a7a" }}>
                <div style={{ marginBottom: 6, color: "#5a7a9a", letterSpacing: "0.5px" }}>POWERSHELL</div>
                {[
                  ["-Mode boost",   "#00ff88"],
                  ["-Mode reset",   "#ff8844"],
                  ["-Mode auto",    "#aa66ff"],
                  ["-Mode monitor", "#00ccff"],
                ].map(([flag, c]) => (
                  <div key={flag} style={{ lineHeight: 1.9 }}>
                    <span style={{ color: "#4a6a8a" }}>.\gpu-force-boost.ps1 </span>
                    <span style={{ color: c }}>{flag}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Event Log */}
            <div style={{ background: "#0d1520", borderRadius: 10, padding: 20, border: "1px solid #1a2a3a", display: "flex", flexDirection: "column" }}>
              <div style={{ fontSize: 12, color: "#5a7a9a", marginBottom: 12, letterSpacing: "1px" }}>EVENT LOG</div>
              <div style={{ flex: 1, overflowY: "auto", fontSize: 11, lineHeight: 2 }}>
                {logs.map((log, i) => (
                  <div key={i} style={{ display: "flex", gap: 8 }}>
                    <span style={{ color: "#3a5a7a", flexShrink: 0 }}>{log.time}</span>
                    <span style={{
                      color: log.type === "success" ? "#00ff88"
                           : log.type === "warn"    ? "#ff8844"
                           : log.type === "error"   ? "#ff3344"
                           : "#6a8aaa",
                    }}>{log.msg}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{ marginTop: 20, textAlign: "center", fontSize: 10, color: "#1a2a3a", letterSpacing: "1px" }}>
            GPU FORCE BOOST DASHBOARD &nbsp;•&nbsp; LIVE DATA VIA NVIDIA-SMI &nbsp;•&nbsp; {new Date().getFullYear()}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GpuDashboard />);
  </script>
</body>
</html>
